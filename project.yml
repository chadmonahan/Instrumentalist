name: Instrumentalist
options:
  bundleIdPrefix: com.chadmonahan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Instrumentalist:
    type: application
    platform: iOS
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    sources:
      - path: Instrumentalist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chadmonahan.instrumentalist
        PRODUCT_NAME: Hymns
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        INFOPLIST_FILE: Instrumentalist/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
